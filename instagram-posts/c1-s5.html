<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C1 S5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .headline {
    font-size: 52px; font-weight: 900;
    color: #F5EDF0; line-height: 1.1;
    letter-spacing: -0.025em; margin-bottom: 52px;
    max-width: 820px;
  }
  .steps {
    display: flex;
    flex-direction: column;
    gap: 22px;
    margin-bottom: 56px;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 24px;
  }
  .step-num {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.1em;
    min-width: 36px;
    padding-top: 2px;
  }
  .step-text {
    font-size: 20px; font-weight: 500;
    color: rgba(245,237,240,0.85);
    line-height: 1.45;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: #93E1D8;
    color: #020202;
    font-size: 20px; font-weight: 800;
    padding: 22px 44px;
    border-radius: 10px;
    letter-spacing: -0.01em;
    text-decoration: none;
    width: fit-content;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">La solución</div>
    <div class="headline">klimze. le escribe al paciente<br>en el momento exacto.</div>

    <div class="steps">
      <div class="step">
        <div class="step-num">01</div>
        <div class="step-text">48h antes: recordatorio automático por WhatsApp</div>
      </div>
      <div class="step">
        <div class="step-num">02</div>
        <div class="step-text">24h antes: solicita confirmación con un clic</div>
      </div>
      <div class="step">
        <div class="step-num">03</div>
        <div class="step-text">Si no confirma: libera el espacio y notifica</div>
      </div>
    </div>

    <div class="cta-btn">Calcula cuánto pierdes &rarr; klimze.app</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">5/5</div>
</body>
</html>
