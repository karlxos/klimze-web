<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C1 S2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.07) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8; letter-spacing: -0.01em;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 32px;
  }
  .headline {
    font-size: 76px; font-weight: 900;
    color: #F5EDF0; line-height: 1.05;
    letter-spacing: -0.03em; margin-bottom: 52px;
  }
  .bullets {
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-bottom: 52px;
  }
  .bullet {
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }
  .bullet-icon {
    flex-shrink: 0;
    margin-top: 3px;
  }
  .bullet-text {
    font-size: 22px; font-weight: 500;
    color: #F5EDF0; line-height: 1.4;
  }
  .footnote {
    font-size: 16px; font-weight: 400;
    color: rgba(245,237,240,0.45);
    line-height: 1.5; max-width: 640px;
    border-left: 2px solid rgba(147,225,216,0.35);
    padding-left: 20px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">La razón real</div>
    <div class="headline">Agendó hace<br>3 semanas.</div>

    <div class="bullets">
      <div class="bullet">
        <div class="bullet-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" fill="rgba(147,225,216,0.15)" stroke="#93E1D8" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" fill="#93E1D8"/>
          </svg>
        </div>
        <div class="bullet-text">Ya no recuerda exactamente el horario</div>
      </div>
      <div class="bullet">
        <div class="bullet-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" fill="rgba(147,225,216,0.15)" stroke="#93E1D8" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" fill="#93E1D8"/>
          </svg>
        </div>
        <div class="bullet-text">Le da pena cancelar, entonces simplemente no va</div>
      </div>
      <div class="bullet">
        <div class="bullet-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" fill="rgba(147,225,216,0.15)" stroke="#93E1D8" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" fill="#93E1D8"/>
          </svg>
        </div>
        <div class="bullet-text">Nadie le confirmó que la cita seguía en pie</div>
      </div>
    </div>

    <div class="footnote">No es mala educación. Es fricción no resuelta.</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">2/5 &rarr;</div>
</body>
</html>
