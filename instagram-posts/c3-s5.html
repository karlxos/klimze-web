<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C3 S5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 800px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.09) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .headline {
    font-size: 90px; font-weight: 900;
    color: #F5EDF0; letter-spacing: -0.035em;
    line-height: 1.0; margin-bottom: 52px;
  }
  .bullets {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 56px;
  }
  .bullet {
    font-size: 24px; font-weight: 500;
    color: rgba(245,237,240,0.75);
    display: flex; align-items: center; gap: 16px;
  }
  .bullet-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #93E1D8;
    flex-shrink: 0;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: #93E1D8;
    color: #020202;
    font-size: 22px; font-weight: 800;
    padding: 26px 52px;
    border-radius: 12px;
    letter-spacing: -0.01em;
    width: fit-content;
    margin-bottom: 24px;
  }
  .subtext-tenue {
    font-size: 15px; font-weight: 500;
    color: rgba(147,225,216,0.45);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Empieza hoy</div>
    <div class="headline">30 días para<br>comprobarlo.</div>

    <div class="bullets">
      <div class="bullet">
        <div class="bullet-dot"></div>
        Sin tarjeta de crédito
      </div>
      <div class="bullet">
        <div class="bullet-dot"></div>
        Configuración en un día
      </div>
      <div class="bullet">
        <div class="bullet-dot"></div>
        Soporte incluido
      </div>
    </div>

    <div class="cta-btn">Empezar ahora &rarr; klimze.app</div>
    <div class="subtext-tenue">Precio fundador activo &mdash; quedan pocos cupos</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">5/5</div>
</body>
</html>
