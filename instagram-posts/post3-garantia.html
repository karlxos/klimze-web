<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Post 3 - La garantía</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #020202;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: #020202;
      overflow: hidden;
      /* Asymmetric: content pushed to left-center */
    }

    /* Mint border frame — only left and top */
    .frame-left {
      position: absolute;
      top: 48px;
      left: 48px;
      bottom: 48px;
      width: 2px;
      background: linear-gradient(180deg, #93E1D8 0%, rgba(147, 225, 216, 0.15) 60%, transparent 100%);
      z-index: 5;
    }

    .frame-top {
      position: absolute;
      top: 48px;
      left: 48px;
      right: 48px;
      height: 2px;
      background: linear-gradient(90deg, #93E1D8 0%, rgba(147, 225, 216, 0.15) 60%, transparent 100%);
      z-index: 5;
    }

    /* Corner dot at intersection */
    .frame-corner {
      position: absolute;
      top: 44px;
      left: 44px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #93E1D8;
      box-shadow: 0 0 12px rgba(147, 225, 216, 0.8), 0 0 24px rgba(147, 225, 216, 0.4);
      z-index: 6;
    }

    /* Large radial glow on the right side (asymmetric) */
    .glow-right {
      position: absolute;
      top: -100px;
      right: -200px;
      width: 800px;
      height: 900px;
      background: radial-gradient(ellipse at center, rgba(147, 225, 216, 0.07) 0%, rgba(147, 225, 216, 0.02) 45%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Secondary glow around shield area */
    .glow-shield {
      position: absolute;
      top: 160px;
      left: 80px;
      width: 320px;
      height: 320px;
      background: radial-gradient(ellipse at center, rgba(147, 225, 216, 0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 1;
    }

    /* Layout: two-column asymmetric */
    .layout {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      z-index: 2;
    }

    /* Left column: shield + badge */
    .col-left {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 0 112px;
      gap: 0;
    }

    .shield-wrapper {
      margin-bottom: 48px;
    }

    .shield-wrapper svg {
      filter: drop-shadow(0 0 20px rgba(147, 225, 216, 0.45)) drop-shadow(0 0 50px rgba(147, 225, 216, 0.20));
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(147, 225, 216, 0.08);
      border: 1px solid rgba(147, 225, 216, 0.25);
      border-radius: 100px;
      padding: 12px 22px;
      margin-top: 60px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #93E1D8;
      flex-shrink: 0;
    }

    .badge-text {
      font-size: 14px;
      font-weight: 600;
      color: #93E1D8;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Vertical divider */
    .divider-v {
      width: 1px;
      background: linear-gradient(180deg, transparent 10%, rgba(147, 225, 216, 0.15) 30%, rgba(147, 225, 216, 0.15) 70%, transparent 90%);
      flex-shrink: 0;
      margin: 0 8px;
    }

    /* Right column: text */
    .col-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 88px 0 56px;
      gap: 0;
    }

    .headline-top {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.35;
      color: #F5EDF0;
      letter-spacing: -0.015em;
      margin-bottom: 20px;
    }

    .headline-mint {
      font-size: 50px;
      font-weight: 900;
      line-height: 1.1;
      color: #93E1D8;
      letter-spacing: -0.025em;
      margin-bottom: 52px;
      text-shadow: 0 0 40px rgba(147, 225, 216, 0.20);
    }

    .separator {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(147, 225, 216, 0.20) 0%, transparent 100%);
      margin-bottom: 36px;
    }

    .subtext {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.7;
      color: rgba(245, 237, 240, 0.40);
      margin-bottom: 0;
    }

    /* URL bottom right */
    .url {
      position: absolute;
      bottom: 68px;
      right: 88px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(147, 225, 216, 0.45);
      letter-spacing: 0.06em;
      z-index: 5;
    }

    /* Decorative noise/grain overlay via SVG */
    .noise {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- Frame elements -->
    <div class="frame-corner"></div>
    <div class="frame-left"></div>
    <div class="frame-top"></div>

    <!-- Glows -->
    <div class="glow-right"></div>
    <div class="glow-shield"></div>

    <!-- Grain texture -->
    <div class="noise"></div>

    <!-- Main layout -->
    <div class="layout">
      <!-- Left column -->
      <div class="col-left">
        <div class="shield-wrapper">
          <!-- Shield with checkmark SVG -->
          <svg width="128" height="144" viewBox="0 0 128 144" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Shield body -->
            <path d="M64 4L8 26V72C8 100.5 32 124.5 64 136C96 124.5 120 100.5 120 72V26L64 4Z" fill="rgba(147,225,216,0.08)" stroke="#93E1D8" stroke-width="1.5"/>
            <!-- Inner shield accent -->
            <path d="M64 16L20 34V72C20 96.5 39 116.5 64 126C89 116.5 108 96.5 108 72V34L64 16Z" fill="rgba(147,225,216,0.04)" stroke="rgba(147,225,216,0.25)" stroke-width="1"/>
            <!-- Checkmark -->
            <path d="M42 72L56 86L86 58" stroke="#93E1D8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="badge">
          <div class="badge-dot"></div>
          <div class="badge-text">Garant&iacute;a klimze &nbsp;&middot;&nbsp; 30 d&iacute;as</div>
        </div>
      </div>

      <!-- Vertical divider -->
      <div class="divider-v"></div>

      <!-- Right column -->
      <div class="col-right">
        <div class="headline-top">Si en 30 d&iacute;as no recup&eacute;r&aacute;s<br>m&aacute;s de lo que pag&aacute;s,</div>
        <div class="headline-mint">cancelamos<br>sin preguntas.</div>
        <div class="separator"></div>
        <div class="subtext">
          Sin contratos.<br>
          Sin letra peque&ntilde;a.<br>
          Sin riesgo.
        </div>
      </div>
    </div>

    <div class="url">klimze.app</div>
  </div>
</body>
</html>
