<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Post 2 Slide 1 - El número</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #020202;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: #020202;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Top line */
    .canvas::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #93E1D8 30%, #93E1D8 70%, transparent 100%);
      z-index: 10;
    }

    /* Glow behind the number */
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(147, 225, 216, 0.09) 0%, rgba(147, 225, 216, 0.02) 50%, transparent 72%);
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 860px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #93E1D8;
      margin-bottom: 64px;
    }

    .number-block {
      margin-bottom: 28px;
    }

    .number-giant {
      font-size: 188px;
      font-weight: 900;
      line-height: 0.9;
      color: #93E1D8;
      letter-spacing: -0.04em;
      /* Subtle text glow */
      text-shadow: 0 0 80px rgba(147, 225, 216, 0.25), 0 0 160px rgba(147, 225, 216, 0.10);
    }

    .number-sublabel {
      font-size: 26px;
      font-weight: 400;
      color: rgba(245, 237, 240, 0.60);
      margin-top: 20px;
      letter-spacing: -0.01em;
    }

    .separator {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(147, 225, 216, 0.2) 0%, transparent 80%);
      margin: 52px 0 40px 0;
    }

    .footnote {
      font-size: 15px;
      font-weight: 400;
      color: rgba(245, 237, 240, 0.40);
      letter-spacing: 0.01em;
    }

    /* Slide indicator */
    .slide-indicator {
      position: absolute;
      bottom: 64px;
      right: 64px;
      font-size: 15px;
      font-weight: 500;
      color: rgba(147, 225, 216, 0.45);
      letter-spacing: 0.04em;
      z-index: 2;
    }

    /* Brand mark */
    .brand-mark {
      position: absolute;
      bottom: 64px;
      left: 110px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(147, 225, 216, 0.18);
      letter-spacing: 0.05em;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>

    <div class="content">
      <div class="label">Tu clínica pierde</div>
      <div class="number-block">
        <div class="number-giant">$2,580</div>
        <div class="number-sublabel">al mes. En promedio.</div>
      </div>
      <div class="separator"></div>
      <div class="footnote">Basado en 100 citas/semana &nbsp;·&nbsp; 20% no-shows &nbsp;·&nbsp; $30 por cita</div>
    </div>

    <div class="brand-mark">klimze</div>
    <div class="slide-indicator">1/3 &nbsp;&rarr;</div>
  </div>
</body>
</html>
