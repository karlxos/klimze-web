<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C3 S1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 800px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 80px 140px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 52px;
  }
  .headline-block {
    margin-bottom: 72px;
  }
  .hl-white {
    font-size: 78px; font-weight: 900;
    color: #F5EDF0; line-height: 1.0;
    letter-spacing: -0.03em;
    display: block;
  }
  .hl-mint {
    font-size: 90px; font-weight: 900;
    color: #93E1D8; line-height: 1.0;
    letter-spacing: -0.035em;
    display: block;
    text-shadow: 0 0 60px rgba(147,225,216,0.3);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: rgba(147,225,216,0.08);
    border: 1px solid rgba(147,225,216,0.25);
    border-radius: 100px;
    padding: 16px 28px;
  }
  .badge-text {
    font-size: 17px; font-weight: 600;
    color: rgba(245,237,240,0.75);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Garantía klimze.</div>

    <div class="headline-block">
      <span class="hl-white">Si en 30 días no recuperas</span>
      <span class="hl-mint">más de lo que pagas,</span>
      <span class="hl-white">cancelamos sin preguntas.</span>
    </div>

    <div class="badge">
      <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
        <path d="M14 2L2 7v9c0 7.18 5.16 13.9 12 15.5C20.84 29.9 26 23.18 26 16V7L14 2z" fill="rgba(147,225,216,0.12)" stroke="#93E1D8" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M9 16l3.5 3.5 6.5-7" stroke="#93E1D8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="badge-text">Sin contratos &nbsp;·&nbsp; Sin letra pequeña</span>
    </div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">1/5 &rarr;</div>
</body>
</html>
