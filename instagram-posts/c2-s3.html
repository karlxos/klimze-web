<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C2 S3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .headline {
    font-size: 100px; font-weight: 900;
    color: #93E1D8; letter-spacing: -0.04em;
    line-height: 0.95;
    text-shadow: 0 0 60px rgba(147,225,216,0.25);
    margin-bottom: 44px;
  }
  .subtext {
    font-size: 23px; font-weight: 400;
    color: rgba(245,237,240,0.7);
    line-height: 1.6; max-width: 820px;
    margin-bottom: 44px;
  }
  .stat-box {
    background: rgba(147,225,216,0.07);
    border: 1px solid rgba(147,225,216,0.2);
    border-radius: 12px;
    padding: 24px 32px;
    max-width: 820px;
  }
  .stat-box-text {
    font-size: 17px; font-weight: 600;
    color: rgba(245,237,240,0.75);
    line-height: 1.5;
  }
  .stat-box-text strong {
    color: #93E1D8;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Hábito 02 / 03</div>
    <div class="headline">Facilitan<br>el cambio.</div>
    <div class="subtext">Si el paciente no puede ir, le dan una salida fácil. "Reprogramá acá." Un paciente que reagenda no es una cita perdida — es una cita que se mueve.</div>

    <div class="stat-box">
      <div class="stat-box-text">
        El <strong>40%</strong> de los no-shows hubiera reprogramado si hubiera tenido <strong>la opción fácil</strong>
      </div>
    </div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">3/5 &rarr;</div>
</body>
</html>
