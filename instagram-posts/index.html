<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>@klimze — Instagram Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060606;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .profile-pic {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #020202;
      border: 2px solid #93E1D8;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #93E1D8;
    }
    .profile-name { color: #F5EDF0; font-size: 13px; font-weight: 700; }
    .profile-sub  { color: rgba(245,237,240,0.3); font-size: 11px; }

    /* Carousel tabs */
    .carousel-tabs {
      display: flex;
      gap: 6px;
    }
    .tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(245,237,240,0.1);
      background: transparent;
      color: rgba(245,237,240,0.35);
      font-size: 11px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .tab:hover { border-color: rgba(147,225,216,0.3); color: #93E1D8; }
    .tab.active {
      background: rgba(147,225,216,0.1);
      border-color: rgba(147,225,216,0.5);
      color: #93E1D8;
    }

    /* Viewer */
    .viewer {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .slide-wrapper {
      width: 480px; height: 480px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(147,225,216,0.1);
      position: relative;
      background: #020202;
    }

    iframe {
      width: 1080px; height: 1080px;
      border: none;
      transform: scale(0.4444);
      transform-origin: top left;
      pointer-events: none;
    }

    .nav-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(245,237,240,0.06);
      border: 1px solid rgba(245,237,240,0.1);
      color: #F5EDF0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: rgba(147,225,216,0.12); border-color: rgba(147,225,216,0.4); color: #93E1D8; }
    .nav-btn:disabled { opacity: 0.15; cursor: default; background: transparent; }
    .nav-btn svg { width: 15px; height: 15px; }

    /* Bottom info */
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 480px;
    }

    .dots {
      display: flex;
      gap: 5px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(245,237,240,0.18);
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.active { background: #93E1D8; width: 16px; border-radius: 3px; }

    .counter { color: rgba(245,237,240,0.25); font-size: 11px; font-weight: 500; }

    /* Slide caption */
    .caption {
      width: 480px;
      background: #0d0d0d;
      border: 1px solid rgba(245,237,240,0.06);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .caption-pic {
      width: 28px; height: 28px; border-radius: 50%;
      background: #020202; border: 1.5px solid #93E1D8;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: #93E1D8;
      flex-shrink: 0;
    }
    .caption-text { font-size: 11px; color: rgba(245,237,240,0.45); line-height: 1.5; }
    .caption-text strong { color: rgba(245,237,240,0.75); font-weight: 600; }

    .hint { color: rgba(245,237,240,0.15); font-size: 10px; }
  </style>
</head>
<body>

  <!-- Profile header -->
  <div class="header">
    <div class="profile-pic">k.</div>
    <div>
      <div class="profile-name">klimze.</div>
      <div class="profile-sub">@klimze · klimze.app</div>
    </div>
  </div>

  <!-- Carousel tabs -->
  <div class="carousel-tabs">
    <button class="tab active" onclick="switchCarousel(0)">01 · Por qué no llegan</button>
    <button class="tab" onclick="switchCarousel(1)">02 · 3 hábitos</button>
    <button class="tab" onclick="switchCarousel(2)">03 · La garantía</button>
  </div>

  <!-- Viewer -->
  <div class="viewer">
    <button class="nav-btn" id="prev" onclick="navigate(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>

    <div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
      <div class="slide-wrapper">
        <iframe id="slideFrame" src="c1-s1.html"></iframe>
      </div>
      <div class="bottom">
        <div class="dots" id="dots"></div>
        <div class="counter" id="counter">1 / 5</div>
      </div>
    </div>

    <button class="nav-btn" id="next" onclick="navigate(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <!-- Caption preview -->
  <div class="caption">
    <div class="caption-pic">k.</div>
    <div class="caption-text" id="captionText">Cargando...</div>
  </div>

  <span class="hint">← → teclas de flecha para navegar entre slides</span>

  <script>
    const carousels = [
      {
        slides: ['c1-s1.html','c1-s2.html','c1-s3.html','c1-s4.html','c1-s5.html'],
        captions: [
          '<strong>klimze.</strong> El 20% de los pacientes no llega a su cita. No es descuido — tiene una razón específica. Desliza para entender por qué. <span style="color:#93E1D8">#clinicas #gestionmedica #klimze</span>',
          '<strong>klimze.</strong> La mayoría de los no-shows son psicológicos. El paciente agendó, olvidó, y le da pena cancelar. Eso tiene solución. <span style="color:#93E1D8">#saludpanama #automatizacion</span>',
          '<strong>klimze.</strong> 67% por olvido. 24% por no querer cancelar. 9% por problema real. Solo la primera causa necesita un recordatorio. Las otras dos necesitan un sistema. <span style="color:#93E1D8">#klimze #clinicaspanama</span>',
          '<strong>klimze.</strong> La diferencia entre perder $2,580 al mes y recuperar $2,064 es un sistema de confirmación activa. <span style="color:#93E1D8">#ROI #automatizacion #klimze</span>',
          '<strong>klimze.</strong> 48h antes recordatorio. 24h antes confirmación. Sin respuesta → cupo liberado. Así funciona. → klimze.app <span style="color:#93E1D8">#klimze #whatsappbusiness</span>',
        ]
      },
      {
        slides: ['c2-s1.html','c2-s2.html','c2-s3.html','c2-s4.html','c2-s5.html'],
        captions: [
          '<strong>klimze.</strong> Algunas clínicas tienen menos del 5% de inasistencia. No es suerte — son 3 hábitos concretos. <span style="color:#93E1D8">#clinicas #gestion #klimze</span>',
          '<strong>klimze.</strong> Hábito 1: No solo recuerdan — confirman. Piden una respuesta activa. Esa fricción mínima filtra al paciente que realmente va a llegar. <span style="color:#93E1D8">#klimze #saludpanama</span>',
          '<strong>klimze.</strong> Hábito 2: Facilitan el cambio. Un paciente que reagenda no es una cita perdida — es una cita que se mueve. <span style="color:#93E1D8">#retención #pacientes #klimze</span>',
          '<strong>klimze.</strong> Hábito 3: Hacen seguimiento post-cita. El 70% de pacientes inactivos vuelve si alguien los contacta primero. <span style="color:#93E1D8">#fidelización #klimze #clinicaspanama</span>',
          '<strong>klimze.</strong> Los 3 hábitos. Automáticos. Sin contratar a nadie extra. → klimze.app <span style="color:#93E1D8">#klimze #automatizacion #whatsapp</span>',
        ]
      },
      {
        slides: ['c3-s1.html','c3-s2.html','c3-s3.html','c3-s4.html','c3-s5.html'],
        captions: [
          '<strong>klimze.</strong> Si en 30 días no recuperas más de lo que pagas, cancelamos sin preguntas. Así de simple. <span style="color:#93E1D8">#garantia #klimze #clinicas</span>',
          '<strong>klimze.</strong> Día 1: configuración. Día 7: primer recordatorio automático. Sin cambiar cómo trabajas hoy. <span style="color:#93E1D8">#onboarding #klimze #saaspanama</span>',
          '<strong>klimze.</strong> Semana 2 y 3: confirmación sube 60–80%. Reagendamientos aumentan. Llamadas manuales bajan 70%. <span style="color:#93E1D8">#resultados #klimze #automatizacion</span>',
          '<strong>klimze.</strong> Día 30: pagaste $149. Recuperaste entre $1,200 y $2,500. Si no es así, te devolvemos el mes. <span style="color:#93E1D8">#ROI #garantia #klimze</span>',
          '<strong>klimze.</strong> 30 días para comprobarlo. Sin tarjeta. Configuración en un día. Precio fundador activo → klimze.app <span style="color:#93E1D8">#klimze #founders #clinicaspanama</span>',
        ]
      }
    ];

    let activeCarousel = 0;
    let currentSlide   = 0;

    const frame      = document.getElementById('slideFrame');
    const counter    = document.getElementById('counter');
    const dotsEl     = document.getElementById('dots');
    const captionEl  = document.getElementById('captionText');
    const prevBtn    = document.getElementById('prev');
    const nextBtn    = document.getElementById('next');
    const tabs       = document.querySelectorAll('.tab');

    function buildDots() {
      dotsEl.innerHTML = '';
      const total = carousels[activeCarousel].slides.length;
      for (let i = 0; i < total; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i === currentSlide ? ' active' : '');
        d.onclick = () => goTo(i);
        dotsEl.appendChild(d);
      }
    }

    function goTo(index) {
      currentSlide = index;
      const c = carousels[activeCarousel];
      frame.src = c.slides[currentSlide];
      counter.textContent = `${currentSlide + 1} / ${c.slides.length}`;
      captionEl.innerHTML = c.captions[currentSlide];
      dotsEl.querySelectorAll('.dot').forEach((d, i) => {
        d.className = 'dot' + (i === currentSlide ? ' active' : '');
      });
      prevBtn.disabled = currentSlide === 0;
      nextBtn.disabled = currentSlide === c.slides.length - 1;
    }

    function navigate(dir) {
      const next = currentSlide + dir;
      if (next >= 0 && next < carousels[activeCarousel].slides.length) goTo(next);
    }

    function switchCarousel(index) {
      activeCarousel = index;
      currentSlide   = 0;
      tabs.forEach((t, i) => t.className = 'tab' + (i === index ? ' active' : ''));
      buildDots();
      goTo(0);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Init
    buildDots();
    goTo(0);
  </script>
</body>
</html>
