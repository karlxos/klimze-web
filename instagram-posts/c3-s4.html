<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C3 S4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.09) 0%, transparent 70%);
    top: 55%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 80px 120px 80px;
    text-align: center;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 64px;
    align-self: flex-start;
  }
  .comparison {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
  }
  .row-paid {
    background: #0d0d0d;
    border: 1px solid rgba(245,237,240,0.08);
    border-radius: 16px 16px 0 0;
    padding: 40px 60px;
    width: 100%;
    text-align: center;
  }
  .row-label {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(245,237,240,0.35);
    margin-bottom: 12px;
  }
  .row-number-small {
    font-size: 56px; font-weight: 900;
    color: rgba(245,237,240,0.25);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .arrow-row {
    padding: 16px 0;
  }
  .row-recovered {
    background: rgba(147,225,216,0.05);
    border: 1px solid rgba(147,225,216,0.3);
    border-radius: 0 0 16px 16px;
    padding: 40px 60px;
    width: 100%;
    text-align: center;
  }
  .row-number-big {
    font-size: 96px; font-weight: 900;
    color: #93E1D8; letter-spacing: -0.04em;
    line-height: 1;
    text-shadow: 0 0 60px rgba(147,225,216,0.4), 0 0 120px rgba(147,225,216,0.15);
  }
  .subtext {
    font-size: 16px; font-weight: 400;
    color: rgba(245,237,240,0.4);
    margin-top: 48px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Día 30</div>

    <div class="comparison">
      <div class="row-paid">
        <div class="row-label">Lo que pagaste</div>
        <div class="row-number-small">$149</div>
      </div>

      <div class="arrow-row">
        <svg width="32" height="36" viewBox="0 0 32 36" fill="none">
          <path d="M16 2v28M6 24l10 10 10-10" stroke="#93E1D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="row-recovered">
        <div class="row-label" style="color:rgba(147,225,216,0.6);">Lo que recuperaste</div>
        <div class="row-number-big">$1,200–$2,500</div>
      </div>
    </div>

    <div class="subtext">Si no es así, te devolvemos el mes. Sin condiciones.</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">4/5 &rarr;</div>
</body>
</html>
