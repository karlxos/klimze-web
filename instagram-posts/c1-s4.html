<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C1 S4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 44px;
  }
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .col {
    border-radius: 16px;
    padding: 40px 36px;
  }
  .col-left {
    background: #0d0d0d;
    border: 1px solid rgba(147,225,216,0.15);
  }
  .col-right {
    background: rgba(147,225,216,0.06);
    border: 1px solid rgba(147,225,216,0.3);
  }
  .col-label {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    margin-bottom: 20px;
    color: rgba(245,237,240,0.5);
  }
  .col-label.right {
    color: #93E1D8;
  }
  .col-number {
    font-size: 52px; font-weight: 900;
    line-height: 1; letter-spacing: -0.03em;
    margin-bottom: 28px;
  }
  .col-number.negative {
    color: #e05a4a;
  }
  .col-number.positive {
    color: #93E1D8;
    text-shadow: 0 0 30px rgba(147,225,216,0.3);
  }
  .col-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .col-list li {
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.65);
    display: flex; align-items: center; gap: 10px;
  }
  .col-list li::before {
    content: '·';
    color: #93E1D8;
    font-size: 20px;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Lo que cuesta</div>

    <div class="columns">
      <div class="col col-left">
        <div class="col-label">Sin sistema</div>
        <div class="col-number negative">-$2,580/mes</div>
        <ul class="col-list">
          <li>Llamadas manuales</li>
          <li>Huecos en agenda</li>
          <li>Estrés acumulado</li>
        </ul>
      </div>
      <div class="col col-right">
        <div class="col-label right">Con klimze.</div>
        <div class="col-number positive">+$2,064<br><span style="font-size:28px;font-weight:600;">recuperados</span></div>
        <ul class="col-list">
          <li>WhatsApp automático</li>
          <li>Confirmación activa</li>
          <li>Sin esfuerzo extra</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">4/5 &rarr;</div>
</body>
</html>
