<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C3 S3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .headline {
    font-size: 76px; font-weight: 900;
    color: #F5EDF0; letter-spacing: -0.03em;
    line-height: 1.0; margin-bottom: 52px;
  }
  .metrics {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 44px;
  }
  .metric-card {
    background: #0d0d0d;
    border: 1px solid rgba(147,225,216,0.15);
    border-radius: 12px;
    padding: 26px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .metric-name {
    font-size: 18px; font-weight: 600;
    color: rgba(245,237,240,0.65);
  }
  .metric-value {
    font-size: 36px; font-weight: 900;
    color: #93E1D8; letter-spacing: -0.02em;
    text-shadow: 0 0 20px rgba(147,225,216,0.3);
  }
  .footnote {
    font-size: 15px; font-weight: 400;
    color: rgba(245,237,240,0.4);
    padding-left: 20px;
    border-left: 2px solid rgba(147,225,216,0.3);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Día 8–21</div>
    <div class="headline">Empiezas a ver<br>los números.</div>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-name">Tasa de confirmación</div>
        <div class="metric-value">60–80%</div>
      </div>
      <div class="metric-card">
        <div class="metric-name">Citas reagendadas</div>
        <div class="metric-value">+3–8/sem</div>
      </div>
      <div class="metric-card">
        <div class="metric-name">Tiempo en llamadas</div>
        <div class="metric-value">-70%</div>
      </div>
    </div>

    <div class="footnote">Datos reales de las primeras semanas de uso.</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">3/5 &rarr;</div>
</body>
</html>
