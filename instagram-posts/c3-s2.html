<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C3 S2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.07) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .headline {
    font-size: 76px; font-weight: 900;
    color: #F5EDF0; letter-spacing: -0.03em;
    line-height: 1.0; margin-bottom: 56px;
  }
  .timeline {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 44px;
    padding-left: 20px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 12px;
    bottom: 12px;
    width: 1px;
    background: linear-gradient(to bottom, #93E1D8, rgba(147,225,216,0.2));
  }
  .tl-item {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    padding: 0 0 32px 0;
    position: relative;
  }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-dot {
    position: absolute;
    left: -13px; top: 5px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #93E1D8;
    border: 2px solid #020202;
    box-shadow: 0 0 10px rgba(147,225,216,0.5);
    flex-shrink: 0;
  }
  .tl-text {
    padding-left: 10px;
  }
  .tl-title {
    font-size: 14px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .tl-desc {
    font-size: 20px; font-weight: 500;
    color: #F5EDF0; line-height: 1.4;
  }
  .footnote {
    font-size: 16px; font-weight: 400;
    color: rgba(245,237,240,0.45);
    padding-left: 20px;
    border-left: 2px solid rgba(147,225,216,0.35);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Día 1–7</div>
    <div class="headline">Tu clínica<br>se conecta.</div>

    <div class="timeline">
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div class="tl-text">
          <div class="tl-title">Día 1</div>
          <div class="tl-desc">Configuración en menos de 24h</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div class="tl-text">
          <div class="tl-title">Día 2–3</div>
          <div class="tl-desc">Importa tus pacientes y horarios</div>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div class="tl-text">
          <div class="tl-title">Día 7</div>
          <div class="tl-desc">Tu primer recordatorio automático sale por WhatsApp</div>
        </div>
      </div>
    </div>

    <div class="footnote">Sin cambiar cómo trabajas hoy.</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">2/5 &rarr;</div>
</body>
</html>
