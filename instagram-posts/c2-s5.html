<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C2 S5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.09) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 28px;
  }
  .headline {
    font-size: 54px; font-weight: 900;
    color: #F5EDF0; letter-spacing: -0.025em;
    line-height: 1.1; margin-bottom: 52px;
    max-width: 820px;
  }
  .checks {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 48px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .check-icon {
    flex-shrink: 0;
  }
  .check-text {
    font-size: 23px; font-weight: 600;
    color: #F5EDF0;
  }
  .subtext-small {
    font-size: 16px; font-weight: 600;
    color: #93E1D8; margin-bottom: 44px;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    background: #93E1D8;
    color: #020202;
    font-size: 20px; font-weight: 800;
    padding: 22px 44px;
    border-radius: 10px;
    letter-spacing: -0.01em;
    width: fit-content;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Los 3 en uno</div>
    <div class="headline">klimze. hace los 3 hábitos<br>automáticamente.</div>

    <div class="checks">
      <div class="check-item">
        <div class="check-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" fill="rgba(147,225,216,0.12)" stroke="#93E1D8" stroke-width="1.5"/>
            <path d="M8 14l4 4 8-8" stroke="#93E1D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="check-text">Confirmación activa por WhatsApp</div>
      </div>
      <div class="check-item">
        <div class="check-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" fill="rgba(147,225,216,0.12)" stroke="#93E1D8" stroke-width="1.5"/>
            <path d="M8 14l4 4 8-8" stroke="#93E1D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="check-text">Reprogramación con un clic</div>
      </div>
      <div class="check-item">
        <div class="check-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="13" fill="rgba(147,225,216,0.12)" stroke="#93E1D8" stroke-width="1.5"/>
            <path d="M8 14l4 4 8-8" stroke="#93E1D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="check-text">Seguimiento post-cita automático</div>
      </div>
    </div>

    <div class="subtext-small">Sin contratar a nadie extra.</div>
    <div class="cta-btn">Pruébalo 30 días gratis &rarr; klimze.app</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">5/5</div>
</body>
</html>
