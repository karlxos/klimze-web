<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>klimze — C2 S1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background-color: #020202;
    font-family: 'Inter', system-ui, sans-serif;
    color: #F5EDF0;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 800px; height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(147,225,216,0.09) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .top-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px; background: #93E1D8;
  }
  .brand {
    position: absolute;
    bottom: 48px; left: 54px;
    font-size: 18px; font-weight: 900;
    color: #93E1D8;
  }
  .counter {
    position: absolute;
    bottom: 48px; right: 54px;
    font-size: 16px; font-weight: 500;
    color: rgba(245,237,240,0.45); letter-spacing: 0.04em;
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 80px 120px 80px;
  }
  .label {
    font-size: 13px; font-weight: 700;
    color: #93E1D8; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 40px;
  }
  .big-number {
    font-size: 180px; font-weight: 900;
    color: #93E1D8; letter-spacing: -0.05em;
    line-height: 0.9;
    text-shadow: 0 0 80px rgba(147,225,216,0.35), 0 0 160px rgba(147,225,216,0.15);
    margin-bottom: 32px;
  }
  .subtext {
    font-size: 26px; font-weight: 500;
    color: #F5EDF0; line-height: 1.4;
    margin-bottom: 52px;
    max-width: 700px;
  }
  .separator {
    width: 280px; height: 1px;
    background: rgba(147,225,216,0.5);
    margin-bottom: 36px;
  }
  .cta-text {
    font-size: 16px; font-weight: 600;
    color: #93E1D8; letter-spacing: 0.06em;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="label">Lo que hacen diferente</div>
    <div class="big-number">&lt; 5%</div>
    <div class="subtext">de inasistencia.<br>Algunas clínicas ya llegaron ahí.</div>
    <div class="separator"></div>
    <div class="cta-text">No es suerte. Son 3 hábitos concretos &rarr;</div>
  </div>

  <div class="brand">klimze.</div>
  <div class="counter">1/5 &rarr;</div>
</body>
</html>
